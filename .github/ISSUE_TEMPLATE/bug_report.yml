name: 버그 신고
description: 앱에서 발생한 오류나 예상과 다른 동작을 알려주세요.
title: "[Bug] "
labels: ["bug"]
body:
  - type: dropdown
    id: page
    attributes:
      label: 어느 페이지에서 발생했나요?
      options:
        - 캘린더
        - 할일
        - 포모도로
        - 로그인
        - 기타
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: 문제 설명
      description: 무슨 일이 일어났나요?
      placeholder: 어떤 버튼을 눌렀을 때, 어떤 오류가 나타났는지 설명해주세요.
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: 재현 방법
      description: 단계별로 적어주세요.
      placeholder: |
        1. 캘린더 페이지로 이동
        2. 일정 추가 버튼 클릭
        3. ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: 기대했던 동작
      placeholder: 어떻게 동작해야 한다고 생각하셨나요?
    validations:
      required: true

  - type: input
    id: device
    attributes:
      label: 기기 및 브라우저
      placeholder: 예) iPhone 15, Safari 17 / Windows 11, Chrome 125
    validations:
      required: true

  - type: dropdown
    id: frequency
    attributes:
      label: 얼마나 자주 발생하나요?
      options:
        - 항상 발생
        - 가끔 발생
        - 한 번 발생
    validations:
      required: true

  - type: textarea
    id: error_message
    attributes:
      label: 오류 메시지 (있는 경우)
      description: 화면에 표시된 오류 메시지나 콘솔 에러를 복사해주세요.
      render: shell
